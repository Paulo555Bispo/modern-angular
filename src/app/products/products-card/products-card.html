<mat-card class="product-card">
  <mat-card-header>
    <mat-card-title>{{ product().name }}</mat-card-title>
    <!-- <mat-card-subtitle>Categoria</mat-card-subtitle> -->
  </mat-card-header>

  <mat-card-content>
    @if (product().originalPrice) {
      <span class="sale-badge">On Sale:</span>

      <p class="price-row">
        <span class="current-price">{{ product().price | currency: 'BRL' }}</span>
        <span class="original-price">{{ product().originalPrice | currency: 'BRL' }}</span>
      </p>
    } @else {
      <p class="price-row">
        <span class="current-price">{{ product().price | currency: 'BRL' }}</span>
      </p>
    }

    <img mat-card-image class="product-image" src="{{ product().imageUrl }}" alt="Product Image" />

    <p>{{ product().description }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button color="primary" (click)="onAddToCart()">{{ addButtonLabel() }}</button>
  </mat-card-actions>
</mat-card>
