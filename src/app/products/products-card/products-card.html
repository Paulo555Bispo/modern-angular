<mat-card class="product-card">
  <mat-card-header>
    <mat-card-title>Product Name</mat-card-title>
    <mat-card-subtitle>Category</mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image src="https://lojaintegrada.com.br/hub//wp-content/uploads/2024/01/produtos-para-vender-1_11zon-1024x692.webp" alt="Product Image">
  <mat-card-content>
    <p>
      This is a brief description of the product. It highlights key features and benefits to entice customers to make a purchase.
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary">Add to Cart</button>


  </mat-card-actions>
</mat-card>
