<mat-card class="product-card">
  <mat-card-header>
    <mat-card-title>{{ product().name }}</mat-card-title>
    <!-- <mat-card-subtitle>Categoria</mat-card-subtitle> -->
  </mat-card-header>
  <img mat-card-image
    src="https://lojaintegrada.com.br/hub//wp-content/uploads/2024/01/produtos-para-vender-1_11zon-1024x692.webp"
    alt="Product Image">
  <mat-card-content>

    @if (product().originalPrice) {
    <span class="sale-badge">On Sale:</span>

    <p class="price-row">
      <span class="current-price">{{ product().price | currency:'BRL' }}</span>
      <span class="original-price">{{ product().originalPrice | currency:'BRL' }}</span>
    </p>
    } @else {
    <p class="price-row">
      <span class="current-price">{{ product().price | currency:'BRL' }}</span>
    </p>
    }

    <p>{{ product().description }}</p>

  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary">{{ addButtonLabel() }}</button>

  </mat-card-actions>
</mat-card>
